<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f10">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f10;
  --surface: #151518;
  --text: #e8e8e8;
  --dim: #555;
  --line: #222226;
  --accent: #7c73ff;
  --green: #84c4a0;
  --red: #e06c6c;
}
html {
  background: var(--bg);
  /* アドレスバーを除いた実際の高さを使う */
  height: 100dvh;
}
body {
  width: 100dvw; height: 100dvh;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  /* セーフエリア（ノッチ・パンチホール）対応 */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  display: flex; align-items: center; justify-content: center;
}

/* フルスクリーンボタン */
.fs-btn {
  position: fixed; top: 10px; right: 12px; z-index: 200;
  background: rgba(255,255,255,0.06); border: 1px solid var(--line);
  border-radius: 8px; padding: 5px 9px;
  color: var(--dim); font-size: 14px; cursor: pointer;
  transition: all 0.15s; line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.fs-btn:active { background: rgba(255,255,255,0.12); }

.app {
  width: 100%; height: 100%;
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
}
.divider { background: var(--line); margin: 16px 0; }

/* ─── LEFT: Clock ─── */
.clock-panel {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 16px;
}
.clock-meta { text-align: center; }
.digital-time { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300; letter-spacing: 0.2em; color: var(--dim); }
.date-display { font-size: 10px; font-weight: 300; color: var(--dim); margin-top: 4px; letter-spacing: 0.04em; }

/* ─── RIGHT ─── */
.right-col { display: grid; grid-template-rows: 1fr 1px 1.7fr; }
.h-divider { background: var(--line); margin: 0 16px; }

/* ─ Battery + Weather ─ */
.info-panel { display: grid; grid-template-columns: 1fr 1px 1fr; align-items: center; }
.v-divider { background: var(--line); margin: 12px 0; }
.card { padding: 14px 16px; display: flex; flex-direction: column; gap: 7px; }
.card-label { font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); }
.batt-row { display: flex; align-items: baseline; gap: 3px; }
.batt-num { font-family: 'DM Mono', monospace; font-size: 34px; line-height: 1; font-weight: 300; }
.batt-unit { font-size: 10px; font-weight: 300; color: var(--dim); }
.batt-bar-track { width: 100%; height: 1px; background: var(--line); }
.batt-bar-fill { height: 100%; background: var(--accent); transition: width 1s ease; }
.batt-status { font-size: 8px; font-weight: 300; letter-spacing: 0.1em; color: var(--dim); }
.wx-row { display: flex; align-items: center; gap: 6px; }
.wx-icon { font-size: 22px; line-height: 1; }
.wx-temp { font-family: 'DM Mono', monospace; font-size: 34px; line-height: 1; font-weight: 300; }
.wx-temp span { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 300; color: var(--dim); }
.wx-desc { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }

/* ─ Pomodoro ─ */
.pomodoro-panel {
  padding: 12px 16px 14px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.pomo-top { display: flex; justify-content: space-between; align-items: center; }
.pomo-label-row { display: flex; align-items: center; gap: 8px; }
.pomo-label { font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); }
.pomo-mode-tag {
  font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim);
  padding: 2px 6px; border: 1px solid var(--line); border-radius: 20px;
}
.settings-btn { background: none; border: none; font-size: 12px; color: var(--dim); cursor: pointer; opacity: 0.5; -webkit-tap-highlight-color: transparent; }
.pomo-main { display: flex; align-items: center; justify-content: space-between; flex: 1; padding: 4px 0; }
.pomo-countdown { font-family: 'DM Mono', monospace; font-size: 48px; line-height: 1; font-weight: 300; }
.pomo-sub { font-size: 8px; font-weight: 300; letter-spacing: 0.18em; color: var(--dim); margin-top: 2px; text-transform: uppercase; }
#pomo-arc-svg { transform: rotate(-90deg); }
.arc-bg { stroke: var(--line); }
.arc-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; filter: drop-shadow(0 0 3px rgba(124,115,255,0.4)); }
.arc-fill.break { stroke: var(--green); filter: drop-shadow(0 0 3px rgba(132,196,160,0.35)); }
.pomo-bottom { display: flex; align-items: center; justify-content: space-between; }
.pomo-dots { display: flex; gap: 5px; align-items: center; }
.pomo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--line); transition: background 0.3s; }
.pomo-dot.done { background: var(--accent); }
.pomo-controls { display: flex; gap: 6px; }
.btn {
  background: none; border: 1px solid var(--line); color: var(--text);
  border-radius: 6px; padding: 7px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 400;
  letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.7; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,15,16,0.9); backdrop-filter: blur(6px);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 24px; width: min(90vw, 300px);
  max-height: 80dvh; overflow-y: auto;
}
.modal h3 { font-size: 16px; margin-bottom: 18px; font-weight: 300; letter-spacing: 0.04em; }
.modal label { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); display: block; margin: 12px 0 4px; }
.modal input[type=number] {
  width: 100%; background: transparent; border: none;
  border-bottom: 1px solid var(--line); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 300;
  padding: 6px 0; outline: none;
}
.modal input[type=number]:focus { border-bottom-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-actions .btn { flex: 1; justify-content: center; }

/* Notif */
.notif {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); border-radius: 6px; padding: 7px 16px;
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  z-index: 9998; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
}
.notif.show { opacity: 1; }

/* Wake Lock */
.wakelock-dot {
  position: fixed; bottom: max(10px, env(safe-area-inset-bottom)); right: 12px;
  display: flex; align-items: center; gap: 5px;
  font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--dim); opacity: 0.45;
}
.wakelock-dot .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--dim); }
.wakelock-dot.active { color: var(--green); opacity: 0.65; }
.wakelock-dot.active .dot { background: var(--green); animation: wl-pulse 3s ease-in-out infinite; }
@keyframes wl-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<button class="fs-btn" id="fs-btn" onclick="toggleFullscreen()" title="フルスクリーン">⛶</button>
<div class="notif" id="notif"></div>
<div class="wakelock-dot" id="wl-indicator"><div class="dot"></div><span id="wl-label">sleep</span></div>

<div class="app">
  <!-- LEFT: Clock -->
  <div class="clock-panel">
    <svg id="clock-svg" viewBox="0 0 200 200" style="width:min(42vw,200px);height:min(42vw,200px);">
      <circle cx="100" cy="100" r="98" fill="none" stroke="var(--line)" stroke-width="1"/>
      <g id="ticks"></g>
      <line id="hour-hand"   x1="100" y1="100" x2="100" y2="54" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
      <line id="minute-hand" x1="100" y1="100" x2="100" y2="38" stroke="var(--text)" stroke-width="1.8" stroke-linecap="round"/>
      <line id="second-hand" x1="100" y1="110" x2="100" y2="32" stroke="var(--accent)" stroke-width="1" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="3" fill="var(--text)"/>
    </svg>
    <div class="clock-meta">
      <div class="digital-time" id="digital-time">00:00:00</div>
      <div class="date-display" id="date-display">---</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- RIGHT -->
  <div class="right-col">
    <div class="info-panel">
      <div class="card">
        <div class="card-label">Battery</div>
        <div class="batt-row">
          <div class="batt-num" id="batt-val">—</div>
          <div class="batt-unit">%</div>
        </div>
        <div class="batt-bar-track"><div class="batt-bar-fill" id="batt-bar" style="width:0%"></div></div>
        <div class="batt-status" id="batt-status">読み込み中</div>
      </div>
      <div class="v-divider"></div>
      <div class="card">
        <div class="card-label">Weather</div>
        <div class="wx-row">
          <div class="wx-icon" id="wx-icon">·</div>
          <div class="wx-temp" id="wx-temp">—<span>°C</span></div>
        </div>
        <div class="wx-desc" id="wx-desc">取得中</div>
      </div>
    </div>

    <div class="h-divider"></div>

    <div class="pomodoro-panel">
      <div class="pomo-top">
        <div class="pomo-label-row">
          <span class="pomo-label">Pomodoro</span>
          <span class="pomo-mode-tag" id="pomo-mode">Focus</span>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
      </div>
      <div class="pomo-main">
        <div>
          <div class="pomo-countdown" id="pomo-countdown">25:00</div>
          <div class="pomo-sub" id="pomo-sub">Session 1</div>
        </div>
        <svg id="pomo-arc-svg" viewBox="0 0 80 80" style="width:min(10vw,70px);height:min(10vw,70px);">
          <circle class="arc-bg" cx="40" cy="40" r="34" fill="none" stroke-width="1.5"/>
          <circle class="arc-fill" id="pomo-arc" cx="40" cy="40" r="34" fill="none"
            stroke-width="2" stroke-dasharray="213.63" stroke-dashoffset="0"/>
        </svg>
      </div>
      <div class="pomo-bottom">
        <div class="pomo-dots" id="pomo-dots"></div>
        <div class="pomo-controls">
          <button class="btn" onclick="resetPomodoro()">Reset</button>
          <button class="btn primary" id="pomo-start-btn" onclick="togglePomodoro()">Start</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>Settings</h3>
    <label>Focus (minutes)</label>
    <input type="number" id="set-focus" value="25" min="1" max="60">
    <label>Short break (minutes)</label>
    <input type="number" id="set-break" value="5" min="1" max="30">
    <label>Long break (minutes)</label>
    <input type="number" id="set-long" value="15" min="1" max="60">
    <label>Sessions per set</label>
    <input type="number" id="set-sessions" value="4" min="1" max="8">
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn primary" onclick="applySettings()">Apply</button>
    </div>
  </div>
</div>

<script>
// ─── FULLSCREEN ───
function toggleFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
    document.getElementById('fs-btn').textContent = '✕';
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
    document.getElementById('fs-btn').textContent = '⛶';
  }
}
document.addEventListener('fullscreenchange', () => {
  document.getElementById('fs-btn').textContent = document.fullscreenElement ? '✕' : '⛶';
});
document.addEventListener('webkitfullscreenchange', () => {
  document.getElementById('fs-btn').textContent = document.webkitFullscreenElement ? '✕' : '⛶';
});

// ─── WAKE LOCK ───
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    const ind = document.getElementById('wl-indicator');
    ind.classList.add('active');
    document.getElementById('wl-label').textContent = 'awake';
    wakeLock.addEventListener('release', () => {
      ind.classList.remove('active');
      document.getElementById('wl-label').textContent = 'sleep';
    });
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();

// ─── CLOCK ───
const ticksG = document.getElementById('ticks');
for (let i = 0; i < 60; i++) {
  const a = (i/60)*2*Math.PI, isH = i%5===0;
  const r1 = isH ? 86 : 92;
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', 100+r1*Math.sin(a)); line.setAttribute('y1', 100-r1*Math.cos(a));
  line.setAttribute('x2', 100+97*Math.sin(a)); line.setAttribute('y2', 100-97*Math.cos(a));
  line.setAttribute('stroke', isH ? 'var(--text)' : 'var(--line)');
  line.setAttribute('stroke-width', isH ? '1.5' : '0.8');
  ticksG.appendChild(line);
}
function setHand(id,deg){ document.getElementById(id).setAttribute('transform',`rotate(${deg},100,100)`); }
function updateClock(){
  const n=new Date(), h=n.getHours(), m=n.getMinutes(), s=n.getSeconds(), ms=n.getMilliseconds();
  setHand('second-hand',(s+ms/1000)*6);
  setHand('minute-hand',(m+s/60)*6);
  setHand('hour-hand',((h%12)+m/60)*30);
  const p=x=>String(x).padStart(2,'0');
  document.getElementById('digital-time').textContent=`${p(h)}:${p(m)}:${p(s)}`;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent=`${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]}`;
}
updateClock(); setInterval(updateClock, 50);

// ─── BATTERY ───
async function updateBattery(){
  if(!navigator.getBattery){ document.getElementById('batt-val').textContent='N/A'; return; }
  const bat = await navigator.getBattery();
  function render(){
    const pct = Math.round(bat.level*100);
    document.getElementById('batt-val').textContent = pct;
    document.getElementById('batt-bar').style.width = pct+'%';
    const s = document.getElementById('batt-status');
    if(bat.charging){ s.textContent='Charging'; }
    else { const mins=Math.round(bat.dischargingTime/60); s.textContent=isFinite(mins)?`${mins} min remaining`:'On battery'; }
  }
  render();
  bat.addEventListener('levelchange', render);
  bat.addEventListener('chargingchange', render);
}
updateBattery();

// ─── WEATHER ───
const WX_CODES={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'🌨',80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
const WX_DESC={0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Slight rain',63:'Rain',65:'Heavy rain',71:'Slight snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
async function fetchWeather(){
  try{
    const pos = await new Promise((res,rej) => navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    const {latitude:lat, longitude:lon} = pos.coords;
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto&forecast_days=1`);
    const d = await r.json(), cw = d.current_weather;
    document.getElementById('wx-icon').textContent = WX_CODES[cw.weathercode]??'🌡';
    document.getElementById('wx-temp').innerHTML = `${Math.round(cw.temperature)}<span>°C</span>`;
    document.getElementById('wx-desc').textContent = WX_DESC[cw.weathercode]??'Unknown';
  } catch {
    document.getElementById('wx-icon').textContent = '—';
    document.getElementById('wx-desc').textContent = '位置情報を許可してください';
  }
}
fetchWeather(); setInterval(fetchWeather, 600000);

// ─── POMODORO ───
let FOCUS_MINS=25, BREAK_MINS=5, LONG_MINS=15, MAX_SESSIONS=4;
let running=false, interval=null, isBreak=false, sessCount=0;
let totalSec=FOCUS_MINS*60, remaining=totalSec;
const CIRCUM = 2*Math.PI*34;

function renderPomo(){
  const m=Math.floor(remaining/60), s=remaining%60, p=x=>String(x).padStart(2,'0');
  document.getElementById('pomo-countdown').textContent=`${p(m)}:${p(s)}`;
  const arc = document.getElementById('pomo-arc');
  arc.style.strokeDashoffset = CIRCUM*(1-remaining/totalSec);
  arc.className = 'arc-fill'+(isBreak?' break':'');
  document.getElementById('pomo-mode').textContent = isBreak?(sessCount%MAX_SESSIONS===0?'Long break':'Break'):'Focus';
  document.getElementById('pomo-sub').textContent = `Session ${(sessCount%MAX_SESSIONS)+(isBreak?0:1)}`;
  document.getElementById('pomo-start-btn').textContent = running?'Pause':'Start';
  const de = document.getElementById('pomo-dots'); de.innerHTML='';
  for(let i=0;i<MAX_SESSIONS;i++){
    const d=document.createElement('div');
    d.className='pomo-dot'+(i<sessCount%MAX_SESSIONS?' done':'');
    de.appendChild(d);
  }
}
function togglePomodoro(){
  if(running){ clearInterval(interval); running=false; }
  else {
    running=true;
    interval=setInterval(()=>{
      remaining--;
      if(remaining<=0){
        clearInterval(interval); running=false;
        if(!isBreak){ sessCount++; isBreak=true; const isLong=sessCount%MAX_SESSIONS===0; totalSec=(isLong?LONG_MINS:BREAK_MINS)*60; remaining=totalSec; showNotif(isLong?'Long break':'Short break'); }
        else { isBreak=false; totalSec=FOCUS_MINS*60; remaining=totalSec; showNotif('Back to focus'); }
        renderPomo(); togglePomodoro(); return;
      }
      renderPomo();
    },1000);
  }
  renderPomo();
}
function resetPomodoro(){ clearInterval(interval); running=false; isBreak=false; sessCount=0; totalSec=FOCUS_MINS*60; remaining=totalSec; renderPomo(); }
function openSettings(){ document.getElementById('settings-modal').classList.add('open'); }
function closeSettings(){ document.getElementById('settings-modal').classList.remove('open'); }
function applySettings(){
  FOCUS_MINS=parseInt(document.getElementById('set-focus').value)||25;
  BREAK_MINS=parseInt(document.getElementById('set-break').value)||5;
  LONG_MINS=parseInt(document.getElementById('set-long').value)||15;
  MAX_SESSIONS=parseInt(document.getElementById('set-sessions').value)||4;
  closeSettings(); resetPomodoro();
}
function showNotif(msg){ const el=document.getElementById('notif'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }
document.getElementById('settings-modal').addEventListener('click',function(e){ if(e.target===this)closeSettings(); });
renderPomo();
</script>
</body>
</html>
